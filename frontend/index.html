<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- SEO Meta Tags -->
    <title>Citi-Serve | Empowering Indian Citizens</title>
    <meta name="description" content="Citi-Serve is a modern civic platform for Indian citizens to access legal rights, explore government schemes, file complaints, and track civic issues. Built with transparency and trust." />
